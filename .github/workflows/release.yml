name: Release

permissions:
  contents: write

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to attach artifacts to (e.g. v0.1.0)"
        required: true

jobs:
  build:
    name: build ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: macos-latest
          - os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install Linux webview build deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Verify
        run: bun run verify
      - name: Build
        run: bun run build
      - name: Package
        shell: bash
        run: scripts/package-release.sh "${{ github.event.inputs.tag || github.ref_name }}"
      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: dist/*
          if-no-files-found: error

  # Artifacts attach to the release ONLY when every platform built green.
  # A single red leg means nothing is published.
  publish:
    name: attach artifacts (all-green gate)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ls -la dist/
          gh release upload "${{ github.event.inputs.tag || github.ref_name }}" dist/* --clobber --repo "${{ github.repository }}"
